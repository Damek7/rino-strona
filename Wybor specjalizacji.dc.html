<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #C72562; }
    a { color: #FFFFFF; }
    a:hover { color: #A8BFE9; }
    @keyframes rino-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes antenna-sway { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
  </style>
</helmet>

<div style="min-height: 100vh; background: #C72562; font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden;" data-screen-label="Wybór specjalizacji">

  <!-- Nagłówek -->
  <div style="display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 44px 24px 0; text-align: center;">
    <img src="assets/Rino-logo.png" alt="Rino" style="width: 56px; height: 56px; border-radius: 14px; box-shadow: 0 4px 14px rgba(28,27,32,0.25);">
    <h1 style="margin: 0; color: #FFFFFF; font-size: 34px; font-weight: 900; letter-spacing: -0.5px;">Wybierz swoją specjalizację</h1>
    <p style="margin: 0; color: #A8BFE9; font-size: 17px; font-weight: 700; max-width: 420px;">Możesz zaznaczyć kilka dyscyplin — wszystkie pojawią się na Twoim profilu trenera.</p>
  </div>

  <!-- Scena: karty + Rino z portfelem -->
  <div style="position: relative; width: 720px; max-width: 100%; height: 600px; margin-top: 8px; flex-shrink: 0;">

    <!-- Rino -->
    <div style="position: absolute; left: 50%; bottom: 30px; margin-left: -150px; width: 300px; height: 360px; animation: rino-bob 3.6s ease-in-out infinite; z-index: 1;">
      <svg viewBox="0 0 400 480" style="width: 100%; height: 100%; display: block;" aria-label="Maskotka Rino trzymająca portfel">
        <!-- antenki -->
        <g style="transform-origin: 175px 100px; animation: antenna-sway 3.6s ease-in-out infinite;">
          <path d="M176 104 C 170 66 160 48 146 34" stroke="#A8BFE9" stroke-width="9" stroke-linecap="round" fill="none"></path>
          <circle cx="143" cy="28" r="17" fill="#A8BFE9"></circle>
        </g>
        <g style="transform-origin: 226px 100px; animation: antenna-sway 3.6s ease-in-out infinite reverse;">
          <path d="M226 104 C 234 64 246 48 262 34" stroke="#A8BFE9" stroke-width="9" stroke-linecap="round" fill="none"></path>
          <circle cx="266" cy="28" r="17" fill="#A8BFE9"></circle>
        </g>
        <!-- sylwetka: głowa płynnie przechodząca w korpus, lekko asymetryczna -->
        <path d="M200 92 C 142 92 106 138 100 202 C 95 258 82 300 86 356 C 90 424 138 466 202 466 C 268 466 314 420 316 352 C 318 296 306 254 300 200 C 294 136 258 92 200 92 Z" fill="#A8BFE9"></path>
        <!-- oczy i uśmiech -->
        <ellipse cx="163" cy="212" rx="10" ry="14" fill="#1C1B20"></ellipse>
        <ellipse cx="237" cy="212" rx="10" ry="14" fill="#1C1B20"></ellipse>
        <path d="M172 250 Q 200 268 228 250" stroke="#1C1B20" stroke-width="9" stroke-linecap="round" fill="none"></path>
      </svg>
    </div>

    <!-- tylna ścianka portfela -->
    <div style="position: absolute; left: 50%; bottom: 44px; transform: translateX(-50%); width: 270px; height: 150px; background: #26252C; border-radius: 22px; z-index: 2;"></div>

    <!-- karty specjalizacji -->
    <sc-for list="{{ cards }}" as="card" hint-placeholder-count="4">
      <div onClick="{{ card.toggle }}" role="button" aria-pressed="{{ card.selected }}" style="position: absolute; left: 50%; bottom: 130px; width: 148px; z-index: {{ card.z }}; cursor: pointer; transform: {{ card.transform }}; transition: transform 0.75s cubic-bezier(0.34, 1.4, 0.4, 1); transition-delay: {{ card.delay }};">
        <div style="background: #FFFFFF; border-radius: 20px; padding: 10px 10px 12px; display: flex; flex-direction: column; gap: 8px; align-items: center; box-shadow: {{ card.shadow }}; border: 4px solid {{ card.border }}; transition: border-color 0.25s, box-shadow 0.25s;" style-hover="box-shadow: 0 22px 40px rgba(28,27,32,0.4)">
          <div role="img" aria-label="{{ card.name }}" style="width: 100%; aspect-ratio: 1; border-radius: 13px; background-color: #F3E2EA; background-image: url('{{ card.img }}'); background-size: cover; background-position: center;"></div>
          <div style="display: flex; align-items: center; gap: 7px;">
            <span style="color: #1C1B20; font-size: 17px; font-weight: 900;">{{ card.name }}</span>
            <sc-if value="{{ card.selected }}" hint-placeholder-val="{{ false }}">
              <span style="width: 20px; height: 20px; border-radius: 50%; background: #C72562; color: #FFFFFF; font-size: 12px; font-weight: 900; display: flex; align-items: center; justify-content: center;">✓</span>
            </sc-if>
          </div>
        </div>
      </div>
    </sc-for>

    <!-- przednia ścianka portfela -->
    <div style="position: absolute; left: 50%; bottom: 30px; transform: translateX(-50%); width: 290px; height: 128px; background: #1C1B20; border-radius: 24px; z-index: 4; box-shadow: 0 18px 36px rgba(28,27,32,0.35);">
      <div style="position: absolute; inset: 10px; border: 2px dashed rgba(168,191,233,0.4); border-radius: 16px;"></div>
      <div style="position: absolute; right: 22px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; border-radius: 50%; background: #C72562; border: 3px solid rgba(255,255,255,0.25);"></div>
      <img src="assets/Rino-logo.png" alt="" style="position: absolute; left: 22px; top: 50%; transform: translateY(-50%); width: 34px; height: 34px; border-radius: 9px; opacity: 0.9;">
    </div>

    <!-- łapki Rino na portfelu -->
    <div style="position: absolute; left: 50%; bottom: 62px; transform: translateX(-183px); width: 44px; height: 58px; background: #A8BFE9; border-radius: 22px; z-index: 5; box-shadow: inset -4px -4px 0 rgba(28,27,32,0.08);"></div>
    <div style="position: absolute; left: 50%; bottom: 62px; transform: translateX(139px); width: 44px; height: 58px; background: #A8BFE9; border-radius: 22px; z-index: 5; box-shadow: inset 4px -4px 0 rgba(28,27,32,0.08);"></div>
  </div>

  <!-- CTA -->
  <div style="display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 8px 24px 48px;">
    <sc-if value="{{ hasSelection }}" hint-placeholder-val="{{ false }}">
      <button onClick="{{ noop }}" style="background: #FFFFFF; color: #C72562; border: none; border-radius: 999px; padding: 16px 46px; font-family: 'Nunito', sans-serif; font-size: 19px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 26px rgba(28,27,32,0.3);" style-hover="transform: translateY(-2px)">{{ ctaLabel }}</button>
    </sc-if>
    <sc-if value="{{ noSelection }}" hint-placeholder-val="{{ true }}">
      <div style="color: rgba(255,255,255,0.75); font-size: 15px; font-weight: 700; padding: 16px 0;">Dotknij karty, aby wybrać dyscyplinę</div>
    </sc-if>
    <div style="color: rgba(255,255,255,0.55); font-size: 13px; font-weight: 700;">Squash i kolejne dyscypliny — wkrótce</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;rozrzutKart&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 17, &quot;min&quot;: 0, &quot;max&quot;: 30, &quot;step&quot;: 1, &quot;unit&quot;: &quot;°&quot;, &quot;section&quot;: &quot;Animacja wachlarza&quot; },
  &quot;wysokoscWachlarza&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 240, &quot;min&quot;: 180, &quot;max&quot;: 340, &quot;step&quot;: 5, &quot;unit&quot;: &quot;px&quot;, &quot;section&quot;: &quot;Animacja wachlarza&quot; },
  &quot;rozstawPoziomy&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 132, &quot;min&quot;: 70, &quot;max&quot;: 160, &quot;step&quot;: 2, &quot;unit&quot;: &quot;px&quot;, &quot;section&quot;: &quot;Animacja wachlarza&quot; }
}">
class Component extends DCLogic {
  state = { deployed: false, selected: {} };

  componentDidMount() {
    this._t = setTimeout(() => this.setState({ deployed: true }), 700);
  }
  componentWillUnmount() { clearTimeout(this._t); }

  renderVals() {
    const spread = this.props.rozrzutKart ?? 17;      // stopnie między kartami
    const height = this.props.wysokoscWachlarza ?? 240; // px nad portfelem
    const gapX = this.props.rozstawPoziomy ?? 132;    // px między kartami

    const defs = [
      { id: 'tenis', name: 'Tenis', img: 'assets/Rino-tenis.png' },
      { id: 'boks',  name: 'Boks',  img: 'assets/Rino-boks.png' },
      { id: 'padel', name: 'Padel', img: 'assets/Rino-padel.png' },
      { id: 'golf',  name: 'Golf',  img: 'assets/Rino-golf.png' },
    ];
    const n = defs.length;
    const deployed = this.state.deployed;
    const sel = this.state.selected;

    const cards = defs.map((d, i) => {
      const c = i - (n - 1) / 2; // -1.5 .. 1.5
      const selected = !!sel[d.id];
      let transform;
      if (!deployed) {
        transform = 'translate(-50%, 150px) rotate(0deg) scale(0.85)';
      } else {
        const x = c * gapX;
        const y = -height + Math.abs(c) * 34 - (selected ? 22 : 0);
        const r = c * spread;
        transform = 'translate(calc(-50% + ' + x + 'px), ' + y + 'px) rotate(' + r + 'deg) scale(' + (selected ? 1.07 : 1) + ')';
      }
      return {
        ...d,
        selected,
        transform,
        z: selected ? 6 : 3,
        delay: deployed ? (i * 0.09) + 's' : '0s',
        border: selected ? '#A8BFE9' : '#FFFFFF',
        shadow: selected ? '0 24px 44px rgba(28,27,32,0.45)' : '0 14px 28px rgba(28,27,32,0.3)',
        toggle: () => this.setState(s => ({
          selected: { ...s.selected, [d.id]: !s.selected[d.id] }
        })),
      };
    });

    const count = Object.values(sel).filter(Boolean).length;
    return {
      cards,
      hasSelection: count > 0,
      noSelection: count === 0,
      ctaLabel: count === 1 ? 'Dalej — 1 dyscyplina' : 'Dalej — ' + count + ' dyscypliny',
      noop: () => {},
    };
  }
}
</script>
</body>
</html>
